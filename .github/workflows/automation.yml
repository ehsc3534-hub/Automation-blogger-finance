name: Run Finance Automation Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run automation script
        env:
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GENERIC_TEXT_API_KEY: ${{ secrets.GENERIC_TEXT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PYTHONPATH: .
        run: |
          # রুট বা যেকোনো ফোল্ডার থেকে main.py খুঁজে বের করার বিকল্প ও নিশ্চিত কমান্ড
          MAIN_SCRIPT=$(find . -name "main.py" | head -n 1)
          
          if [ -z "$MAIN_SCRIPT" ]; then
            echo "Error: main.py truly not found in the repository!"
            exit 1
          fi
          
          echo "Found main.py at: $MAIN_SCRIPT"
          SCRIPT_DIR=$(dirname "$MAIN_SCRIPT")
          cd "$SCRIPT_DIR"
          python main.py
          
