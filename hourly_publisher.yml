name: Hourly Automated Finance Publisher

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: publisher-lock
  cancel-in-progress: false

jobs:
  run-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Locate and Execute Main Script
        env:
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GENERIC_TEXT_API_KEY: ${{ secrets.GENERIC_TEXT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "Searching for main.py in the repository..."
          TARGET_FILE=$(find . -name "main.py" -print -quit)
          
          if [ -z "$TARGET_FILE" ]; then
            echo "CRITICAL ERROR: main.py is missing from the entire repository!"
            exit 1
          fi
          
          echo "Successfully found main.py at: $TARGET_FILE"
          DIR_NAME=$(dirname "$TARGET_FILE")
          cd "$DIR_NAME"
          
          echo "Running python main.py from directory: $(pwd)"
          python main.py
          
